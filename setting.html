<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *
    {
        padding: 10px;
        margin: 0;
    }
     


body{
    background:linear-gradient(rgba(0,0,0,0.6), rgba(0, 0, 0, 0.552)),
 url("Gemini_Generated_Image_kmmrhxkmmrhxkmmr.png");
    background-size: cover;

}
.container
{
    display: flex;
    align-items: center;
     color: white;
     position: fixed;
    
}
.nav
{
    justify-content: space-between;
    font-size: 20px;
    gap: 30px;
    margin-left: 40%;
    display: flex;
    position: fixed;
}
.nav a 
{
    text-decoration: none;
    color: white;
    gap: 30px;
}
.nav :hover
{
    opacity: 0.5;
    color: hwb(from color h w b);
}





.box:hover
{
    box-shadow: 0 0 40px rgb(255, 255, 255);
    animation-play-state: paused;
  


}
.btn{
    margin-top: 20px;
    padding: 20px 35px;
    font-size: 18px;
    background-color: #ffffff;
    color: black;
    border: none;
    border-radius: 30px;
    align-items: center;
    margin-left: 50px;
    display: flex;
    margin-top: 100px;

    
}

.btn:hover{
    background-color: transparent;
    color: white;
    border: 2px solid white;
     transform: rotateY(60deg);
    transition: 2s;
    
}
.foot
{
    background-color: rgb(12, 12, 12);
    align-items: center;
    justify-content: center;
    display: flex;


}
.image-box {
    position: absolute;
    top: 30%;
    left: 55%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.image-box img {
    width: 600px;
    height: 400px;
    border-radius: 20px;
    background-color: aliceblue;
}

.image-box input {
    margin-top: 15px;
}




    </style>
</head>
<body>
     <div class="container">
        <h1>TechInfo</h1>
        
        <div class="nav">
                    <a href="#" onclick="home()">Home</a>
                    <a href="#">About us</a>
                    <a href="#">Security</a>
        </div>
    </div>
    <div class="buttons">
<button onclick="security()" class="btn">security</button>
        <button onclick="Registration()" class="btn">Registration</button>
            <button onclick="Login()" class="btn">Login</button>
         <button onclick="Logout()" class="btn">Logout</button>
                </div>
                <div class="image-box">

                 <img  class="image1" src="images/AI.jpeg" >
               <input type="file" id="file" name="file">
                </div>
    <script>
        const img = document.querySelector('img');
        const fileInput = document.querySelector('input'); 

        fileInput.addEventListener("change", () => {
            
            if (fileInput.files && fileInput.files[0]) {
                img.src = URL.createObjectURL(fileInput.files[0]);
            }
        });
                
                    function home()
                    {
                      window.location.href="assigment.html";
                    }
                    function Registration()
                    {
                        window.location.href="registration.html";
                    }
                    function Login()
                    {
                        window.location.href="login.html";
                    }
                    function Logout()
                    {

    alert("Logout Successfully!");
    window.location.href = "assigment.html";
                  }

            
                    
                </script>



</body>
</html>
